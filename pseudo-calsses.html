<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body {
        padding: 32px;
    }
.btn {
    border: none;
    border-radius: 8px;
    background-color: crimson;
    color: bisque;
    padding: 8px 16px;
    font-size: 16px;
}
.btn.hover {
    cursor: pointer;
    background-color: blueviolet;
}
.btn:active {
    padding: 16px 32px;
}
.input {
    padding: 8px;
    border-radius: 8px;
    border: solid 1px crimson;
    color: crimson;
    margin-bottom: 16px;
}
.input.btn:hover {
    border: solid 1px rebeccapurple;
}
input:focus {
border: 2px solid;
}
.bottom {
    margin-bottom: 10px;
}
</style>
</head>
<body>
    <div class="bottom">
        <input type="text" id="email" name="email"
         placeholder="email@exemplo,com">
    </div>

<div class="bottom">
    <input type="password" placeholder="sua senha">
</div>

    <button class="btn">Entrar</button>

</body>
</html>
